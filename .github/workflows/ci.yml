name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ms1:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms1-core-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build

  ms2:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms2-match-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -c "import main"